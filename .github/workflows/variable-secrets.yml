name: Exploring variables and secrets

on:
  push

env:
  CONTAINER_REGISTRY: docker.io
  IMAGE_NAME: github-actions-nginx 

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Docker Build
        run: docker build -t $CONTAINER_REGISTRY/{{ var.DOCKER_USERNAME }}/$IMAGE_NAME

      - name: Docker login
        run: docker login --username={{ var.DOCKER_USERNAME }} --password={{ secret.DOCKER_PASS }}

      - name: Docker Publish
        run: docker push $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Docker run
        run: docker run -d -p 8080:80 $CONTAINER_REGISTRY/{{ var.DOCKER_USERNAME }}/$IMAGE_NAME


