name: Exploring variables and secrets

on:
  push

env:
  CONTAINER_REGISTRY: docker.io
  DOCKER_USERNAME: username
  IMAGE_NAME: github-actions-nginx 

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Docker Build
        run: docker build -t $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME

      - name: Docker login
        env:
            DOCKER_PASS: password123
        run: docker login --username=dockerUsername --password=$DOCKER_PASS

      - name: Docker Publish
        run: docker push $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Docker run
        run: docker run -d -p 8080:80 docker.io/dockerUsername/imageName:latest


