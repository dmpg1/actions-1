name: My First Workflow

on: push

jobs:
    firs_job:
      runs-on: ubuntu-latest
      steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Welcome message
        run: |
          echo "My firs GitHub Actions job"
          ls -ltra
          cat README.md

      - name: Generate ASCII Artwork
        run: cowsay -f tux "Я пингвин Tux!" >> tux.txt


          
