name: Multi jobs

on: push

jobs:
  build_job_1:
    runs-on: ubuntu-latest

    steps:
      - name: Install cowsay
        run: sudo apt-get install cowsay -y

      - name: Generate ASCII Artwork
        run: cowsay -f tux "Я пингвин Tux!" >> tux.txt

      - uses: actions/upload-artifact@v7
        with:
        name: tux-text-file
          path: tux.txt
    
  test_job_2:
      runs-on: ubuntu-latest
      needs: build_job_1

      steps:
        - name: Download tux text file
          uses: actions/download-artifact@v8
          with:
            name: tux-text-file

        - name: Test file exists
          run: grep -i "tux" tux.txt 
    
  deploy_job_3: 
      runs-on: ubuntu-latest
      needs: test_job_2

      - name: Download tux text file
        uses: actions/download-artifact@v8
        with:
          name: tux-text-file

        steps:
          - name: Read file
            run: cat tux.txt

          - name: Deploy
            run: echo Deploying ... .. .

