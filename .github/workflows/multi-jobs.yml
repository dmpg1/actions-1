name: Multi jobs

on: push

jobs:
  build_job_1:
    runs-on: ubuntu-latest

    steps:
      - name: Install cowsay
        run: sudo apt-get update && sudo apt-get install -y cowsay

      - name: Generate ASCII Artwork
        run: cowsay -f tux "Я пингвин Tux!" >> tux.txt

      - name: Upload tux text file
        uses: actions/upload-artifact@v7
        with:
          name: tux-text-file
          path: tux.txt

  test_job_2:
    runs-on: ubuntu-latest
    needs: build_job_1

    steps:
      - name: Download tux text file
        uses: actions/download-artifact@v8
        with:
          name: tux-text-file

      
      - name: Verify file exists
        run: ls -l tux.txt

      - name: Test file contains "tux"
        run: grep -i "tux" tux.txt

  deploy_job_3:
    runs-on: ubuntu-latest
    needs: test_job_2

    steps:
      - name: Download tux text file
        uses: actions/download-artifact@v8
        with:
          name: tux-text-file

      - name: Read file
        run: cat tux.txt

      - name: Deploy
        run: echo "Deploying..."
