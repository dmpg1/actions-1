name: Generate ASCII Artwork

on: push 

jobs:
  ascii_job:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Files List 
        run: ls -ltra

      - name: Shell script execution
        run: |
          chmod +x ascii_script.sh
          ./ascii_script.sh
          